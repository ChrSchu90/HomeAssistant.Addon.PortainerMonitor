version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/" # default location of `.github/workflows`
    schedule:
      interval: "weekly"
      day: "friday"
      time: "12:00"
      timezone: "Europe/Berlin"
  
  - package-ecosystem: "nuget"
    directory: "/portainer-monitor-addon/source"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "12:00"
      timezone: "Europe/Berlin"
  
  - package-ecosystem: "docker"
    directory: "/portainer-monitor-addon"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "12:00"
      timezone: "Europe/Berlin"
